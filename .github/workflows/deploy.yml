name: Deploy on Push

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'        # Only trigger when Enveloppe pushes notes to docs/
  workflow_dispatch:     # Also allow manual runs

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: Enveloppe/wiki/.github/workflows/deploy.yml@main
    with:
      FETCH_SUBMODULE: false  # Change to true if you ever use submodules
    secrets:
      GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
